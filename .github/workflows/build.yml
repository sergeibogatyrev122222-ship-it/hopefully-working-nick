name: Build NickPlugin
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Build with Maven
        run: cd NickPlugin2 && mvn clean package --no-transfer-progress
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: NickPlugin
          path: NickPlugin2/target/NickPlugin-*.jar
          retention-days: 30
